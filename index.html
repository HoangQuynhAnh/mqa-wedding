<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Thiệp cưới</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(to bottom, #e7b4b4, #d4a0a0);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Card */
    .card {
      background: #fff5f5;
      width: 320px;
      z-index: 10;
      border-radius: 16px;
      text-align: center;
      padding: 100px 20px 40px;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    /* Envelope top */
    .envelope {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 90px;
      background: #8d5c5c;
      border-radius: 16px 16px 0 0;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .heart-icon {
      width: 40px;
      height: 40px;
      background: red;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 20px;
    }

    h1 {
      margin: 10px 0;
      font-size: 26px;
      color: #6b3d3d;
    }

    .date {
      color: #8a6a6a;
      margin: 8px 0;
    }

    .invite {
      margin: 12px 0 20px;
      color: #6b3d3d;
    }

    button {
      background: #8d5c5c;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button:hover {
      background: #734747;
    }

    /* Falling hearts */
.heart {
  position: absolute;
  top: -20px;
  width: 12px;
  height: 12px;
  background: red;
  transform: rotate(45deg);
  animation: floatFall linear forwards;
  z-index: 1;
  pointer-events: none;

  /* viền ngoài */
      filter: drop-shadow(0 0 0 black)
        drop-shadow(1px 1px 0 black)
        drop-shadow(-1px -1px 0 black);
  }
  .heart.dark {
  background: linear-gradient(
    to right,
    #b30000 0%,
    #b30000 12%,
    #ff2a2a 20%,
    #ff2a2a 100%
  );
}

.heart.dark::before,
.heart.dark::after {
  background: linear-gradient(
    to right,
    #b30000 0%,
    #b30000 12%,
    #ff2a2a 20%,
    #ff2a2a 100%
  );
}

/* tim đỏ nhạt */
.heart.light {
  background: linear-gradient(
    to right,
    #ff9aaa 0%,
    #ff9aaa 12%,
    #ff5c7a 20%,
    #ff5c7a 100%
  );
}

.heart.light::before,
.heart.light::after {
  background: linear-gradient(
    to right,
    #ff9aaa 0%,
    #ff9aaa 12%,
    #ff5c7a 20%,
    #ff5c7a 100%
  );
}
.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 12px;
  height: 12px;
  background: red;
  border-radius: 50%;
}

.heart::before {
  top: -6px;
  left: 0;
}

.heart::after {
  left: -6px;
  top: 0;
}

/* ===== highlight trắng ===== */
.heart .shine {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 6px;
  height: 3px;
  border-radius: 50%;
  background: rgba(255,255,255,0.8);
  transform: rotate(-20deg);
}
@keyframes floatFall {
  0% {
    transform: translateY(0) rotate(var(--rotate-start)) scale(var(--size));
    opacity: 0.9;
  }

  50% {
    transform: translateY(50vh) rotate(var(--rotate-mid)) scale(var(--size));
    opacity: 0.7;
  }

  100% {
    transform: translateY(110vh) rotate(var(--rotate-end)) scale(var(--size));
    opacity: 0;
  }
}
    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(45deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="envelope">
      <div class="heart-icon">❤</div>
    </div>

    <h1>Bảo & Vy</h1>
    <div class="date">23 tháng 11, 2025</div>
    <div class="invite">Thân Mời</div>
    <button>✉ Mở thiệp</button>
  </div>
<script>
 function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");

  // random kiểu màu
  const type = Math.random() < 0.5 ? "dark" : "light";
  heart.classList.add(type);

  const size = Math.random() * 0.5 + 0.6;
  const duration = Math.random() * 4 + 6;

  const rotateStart = Math.random() * 360 + "deg";
  const rotateMid = (Math.random() * 360 - 180) + "deg";
  const rotateEnd = (Math.random() * 360 - 180) + "deg";

  heart.style.left = Math.random() * window.innerWidth + "px";
  heart.style.animationDuration = duration + "s";

  heart.style.setProperty("--size", size);
  heart.style.setProperty("--rotate-start", rotateStart);
  heart.style.setProperty("--rotate-mid", rotateMid);
  heart.style.setProperty("--rotate-end", rotateEnd);

  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), duration * 1000);
}

setInterval(createHeart, 700);
</script>

</body>
</html>
